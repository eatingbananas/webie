<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>helenyzh</title>
  <link rel="icon" type="image/x-icon" href="/Assets/wayup.png">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="stage">
    <div id="layer1"></div>
    <div id="layer2"></div>
  </div>
  <script src="main.js"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js';
    import { getDatabase, ref, push, onChildAdded } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyD1bqIVIWr683C16T_GpJypaF04_jUmJa0",
      authDomain:        "moringa-64ab0.firebaseapp.com",
      databaseURL:       "https://moringa-64ab0-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "moringa-64ab0",
      storageBucket:     "moringa-64ab0.firebasestorage.app",
      messagingSenderId: "106289519784",
      appId:             "1:106289519784:web:40b4ec27482d895de1b69d"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // ── GuestWeb ──────────────────────────────────────────────────────────────
    const GW_X = 4000;
    const GW_Y = 2000;

    const GW_SCALE           = 1.5;  // ← scale the entire GuestWeb block (form + entries)
    const GW_DISCLAIMER_SIZE = 10; // ← "by signing..." font size only

    // Expose coords so the main.js GuestWeb link can scroll to this position.
    document.body.dataset.gwX = GW_X;
    document.body.dataset.gwY = GW_Y;

    const layer2 = document.getElementById('layer2');

    const s      = "font-family:'Lucida Grande',Arial,sans-serif;font-size:11px;color:#333;";
    const sSmall = "font-family:'Lucida Grande',Arial,sans-serif;font-size:" + GW_DISCLAIMER_SIZE + "px;color:#888;";

    // Wrapper holds form + entries so GW_SCALE transforms everything together
    const gwWrapper = document.createElement('div');
    gwWrapper.id = 'guestweb-area';
    Object.assign(gwWrapper.style, {
      position:        'absolute',
      left:            GW_X + 'px',
      top:             GW_Y + 'px',
      zIndex:          '5',
      transformOrigin: 'top left',
      transform:       'scale(' + GW_SCALE + ')',
    });

    const formEl = document.createElement('div');
    Object.assign(formEl.style, { position: 'absolute', left: '0', top: '0', width: '190px' });
    formEl.innerHTML =
      '<div style="' + s + 'margin-bottom:6px;">GuestWeb</div>' +
      '<input id="gw-name" type="text" placeholder="name or alias" maxlength="60" style="display:block;width:100%;margin-bottom:4px;box-sizing:border-box;' + s + '">' +
      '<input id="gw-site" type="text" placeholder="your site, optional" maxlength="200" style="display:block;width:100%;margin-bottom:6px;box-sizing:border-box;' + s + '">' +
      '<button id="gw-submit" style="' + s + 'cursor:pointer;">sign</button>' +
      '<div style="' + sSmall + 'margin-top:6px;">by signing, your name and link are visible to visitors</div>';

    gwWrapper.appendChild(formEl);
    layer2.appendChild(gwWrapper);

    // Entries scatter below the form — positions are relative to gwWrapper
    const BASE_X = 0;
    const BASE_Y = 120;
    let entryCount = 0;

    // Seeded RNG (xorshift32)
    let _s = 4817;
    function gwRand(min, max) {
      _s ^= _s << 13; _s ^= _s >>> 17; _s ^= _s << 5; _s = _s >>> 0;
      return min + (_s / 0x100000000) * (max - min);
    }

    function addEntry(name, website) {
      const ex = Math.round(BASE_X + gwRand(-40, 140));
      const ey = Math.round(BASE_Y + entryCount * 17 + gwRand(-2, 2));
      entryCount++;

      const el = document.createElement('div');
      Object.assign(el.style, {
        position:   'absolute',
        left:       ex + 'px',
        top:        ey + 'px',
        fontFamily: "'Lucida Grande', Arial, sans-serif",
        fontSize:   '11px',
        color:      '#333',
        whiteSpace: 'nowrap',
      });

      if (website && website.trim()) {
        const href = /^https?:\/\//i.test(website.trim()) ? website.trim() : 'https://' + website.trim();
        const a = document.createElement('a');
        a.href        = href;
        a.target      = '_blank';
        a.rel         = 'noopener noreferrer';
        a.textContent = name;
        Object.assign(a.style, { color: '#336', textDecoration: 'underline' });
        el.appendChild(a);
      } else {
        el.textContent = name;
      }

      gwWrapper.appendChild(el);
    }

    // Load existing + live new entries
    onChildAdded(ref(db, 'guestweb'), snap => {
      const d = snap.val();
      if (d && d.name) addEntry(d.name, d.website || '');
    });

    // Submit
    document.getElementById('gw-submit').addEventListener('click', () => {
      const name = (document.getElementById('gw-name').value || '').trim();
      if (!name) return;
      const website = (document.getElementById('gw-site').value || '').trim();
      push(ref(db, 'guestweb'), { name, website, timestamp: Date.now() });
      document.getElementById('gw-name').value = '';
      document.getElementById('gw-site').value = '';
    });
  </script>
</body>
</html>
