<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>helenyzh</title>
  <link rel="icon" type="image/x-icon" href="/Assets/wayup.png">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="stage">
    <div id="layer1"></div>
    <div id="layer2"></div>
  </div>
  <script src="main.js"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js';
    import { getDatabase, ref, push, onChildAdded } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyD1bqIVIWr683C16T_GpJypaF04_jUmJa0",
      authDomain:        "moringa-64ab0.firebaseapp.com",
      databaseURL:       "https://moringa-64ab0-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "moringa-64ab0",
      storageBucket:     "moringa-64ab0.firebasestorage.app",
      messagingSenderId: "106289519784",
      appId:             "1:106289519784:web:40b4ec27482d895de1b69d"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // ── GuestWeb ──────────────────────────────────────────────────────────────
    const GW_X = 3600;
    const GW_Y = 1000;

    // Expose coords so the main.js GuestWeb link can scroll to this position.
    document.body.dataset.gwX = GW_X;
    document.body.dataset.gwY = GW_Y;

    const layer2 = document.getElementById('layer2');

    const s = 'font-family:"Lucida Grande",Arial,sans-serif;font-size:11px;color:#333;';

    const formEl = document.createElement('div');
    formEl.id = 'guestweb-area';
    Object.assign(formEl.style, {
      position: 'absolute',
      left:     GW_X + 'px',
      top:      GW_Y + 'px',
      zIndex:   '5',
      width:    '190px',
    });
    formEl.innerHTML =
      '<input id="gw-name" type="text" placeholder="your name" maxlength="60" style="display:block;width:100%;margin-bottom:4px;box-sizing:border-box;' + s + '">' +
      '<input id="gw-site" type="text" placeholder="your site, optional" maxlength="200" style="display:block;width:100%;margin-bottom:4px;box-sizing:border-box;' + s + '">' +
      '<input id="gw-msg"  type="text" placeholder="..." maxlength="166" style="display:block;width:100%;margin-bottom:6px;box-sizing:border-box;' + s + '">' +
      '<button id="gw-submit" style="' + s + 'cursor:pointer;">drop</button>';

    layer2.appendChild(formEl);

    // Entries scatter below the form
    const BASE_X = GW_X;
    const BASE_Y = GW_Y + 140;
    let entryCount = 0;

    // Seeded RNG (xorshift32)
    let _s = 4817;
    function gwRand(min, max) {
      _s ^= _s << 13; _s ^= _s >>> 17; _s ^= _s << 5; _s = _s >>> 0;
      return min + (_s / 0x100000000) * (max - min);
    }

    function formatDate(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
    }

    function addEntry(name, website, message, timestamp) {
      const ex = Math.round(BASE_X + gwRand(-40, 140));
      const ey = Math.round(BASE_Y + entryCount * 17 + gwRand(-2, 2));
      entryCount++;

      // Name element (same styling as before)
      const el = document.createElement('div');
      Object.assign(el.style, {
        position:   'absolute',
        left:       ex + 'px',
        top:        ey + 'px',
        zIndex:     '5',
        fontFamily: '"Lucida Grande", Arial, sans-serif',
        fontSize:   '11px',
        color:      '#333',
        whiteSpace: 'nowrap',
      });

      if (website && website.trim()) {
        const href = /^https?:\/\//i.test(website.trim()) ? website.trim() : 'https://' + website.trim();
        const a = document.createElement('a');
        a.href        = href;
        a.target      = '_blank';
        a.rel         = 'noopener noreferrer';
        a.textContent = name;
        Object.assign(a.style, { color: '#336', textDecoration: 'underline' });
        el.appendChild(a);
      } else {
        el.textContent = name;
      }

      layer2.appendChild(el);

      // Message element — offset 30–80px in a random direction from name
      if (message && message.trim()) {
        const offX = Math.round(gwRand(-80, 80));
        const offY = Math.round(gwRand(30, 80));
        const mx   = ex + offX;
        const my   = ey + offY;

        const msgEl = document.createElement('div');
        Object.assign(msgEl.style, {
          position:   'absolute',
          left:       mx + 'px',
          top:        my + 'px',
          zIndex:     '5',
          fontFamily: '"Lucida Grande", Arial, sans-serif',
          fontSize:   '10px',
          color:      '#333',
          maxWidth:   '200px',
          lineHeight: '1.4',
          cursor:     'default',
        });
        msgEl.textContent = message.trim();

        // Date label — fades in on hover, no box
        if (timestamp) {
          const dateEl = document.createElement('span');
          dateEl.textContent = formatDate(timestamp);
          Object.assign(dateEl.style, {
            marginLeft:  '6px',
            fontFamily:  '"Lucida Grande", Arial, sans-serif',
            fontSize:    '9px',
            color:       '#aaa',
            opacity:     '0',
            transition:  'opacity 0.2s ease',
            whiteSpace:  'nowrap',
            verticalAlign: 'middle',
          });
          msgEl.appendChild(dateEl);
          msgEl.addEventListener('mouseenter', () => { dateEl.style.opacity = '1'; });
          msgEl.addEventListener('mouseleave', () => { dateEl.style.opacity = '0'; });
        }

        layer2.appendChild(msgEl);
      }
    }

    // Load existing + live new entries
    onChildAdded(ref(db, 'guestweb'), snap => {
      const d = snap.val();
      if (d && d.name) addEntry(d.name, d.website || '', d.message || '', d.timestamp || 0);
    });

    // Submit
    document.getElementById('gw-submit').addEventListener('click', () => {
      const name = (document.getElementById('gw-name').value || '').trim();
      if (!name) return;
      const website = (document.getElementById('gw-site').value || '').trim();
      const message = (document.getElementById('gw-msg').value  || '').trim();
      push(ref(db, 'guestweb'), { name, website, message, timestamp: Date.now() });
      document.getElementById('gw-name').value = '';
      document.getElementById('gw-site').value = '';
      document.getElementById('gw-msg').value  = '';
    });
  </script>
</body>
</html>
